# Docker Compose for Xiuxian Mini Web

services:
  # Main web application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xiuxian-web
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      # Persist database
      - ./data:/app/data
      # Persist logs
      - ./logs:/app/logs
      # Serve frontend from host source (no image rebuild needed for web/ changes)
      - ./web:/app/web:ro
      # Run backend from host source too (keep-alive/backlog fix lives here; no rebuild needed)
      - ./backend:/app/backend:ro
    environment:
      - MINIWEB_ACCESS_TOKEN=${MINIWEB_ACCESS_TOKEN:-}
      - MINIWEB_HOST=0.0.0.0
      - MINIWEB_PORT=8787
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - RATE_LIMIT_WINDOW_SEC=${RATE_LIMIT_WINDOW_SEC:-60}
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Miniweb-Token: $$MINIWEB_ACCESS_TOKEN\" http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - xiuxian-network

  # Backup service (runs daily at 2 AM)
  backup:
    image: alpine:latest
    container_name: xiuxian-backup
    restart: unless-stopped
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    command: >
      sh -c "
      apk add --no-cache tar gzip &&
      while true; do
        DATE=$$(date +%Y%m%d_%H%M%S) &&
        tar czf /backups/data-$$DATE.tar.gz /data &&
        find /backups -name 'data-*.tar.gz' -mtime +7 -delete &&
        sleep 86400;
      done
      "
    networks:
      - xiuxian-network

networks:
  xiuxian-network:
    driver: bridge

volumes:
  data:
  logs:
  backups:
