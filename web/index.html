<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>修仙 Mini Web</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/chat-layout.css" />
  </head>
  <body>
    <div class="app-shell chat-client-shell">
      <aside class="sidebar conversation-rail command-rail">
        <div class="sidebar-title">
          <strong>修仙群聊</strong>
          <span>Telegram 游戏客户端</span>
        </div>

        <section class="panel schedule-rail-panel">
          <div class="panel-head">
            <h2>官方定时</h2>
            <div class="panel-head-actions">
              <button id="scheduleRailRefreshButton" type="button">刷新</button>
              <button id="scheduleButton" type="button">新建</button>
            </div>
          </div>
          <div id="scheduleRail" class="schedule-rail" aria-live="polite">
            <p class="empty inline">正在读取官方定时...</p>
          </div>
        </section>

        <section class="panel common-action-panel">
          <div class="panel-head">
            <h2>常用</h2>
            <div class="panel-head-actions">
              <button id="logsButton" type="button" title="按日期 / 类型筛选浏览全部采集到的消息">记录</button>
            </div>
          </div>
          <div class="sidebar-toolbox primary-toolbox">
            <button id="dungeonStatusButton" type="button" title="按副本 ID 汇总最近开房、加入、失败、解散和推进消息">副本状态</button>
            <button id="resourceStatsButton" type="button" title="野外历练和非血色副本的全服收益统计">资源统计</button>
            <button id="inventoryButton" type="button" title="查看最近储物袋快照并生成批量转移命令">库存/转移</button>
            <button id="outboxButton" type="button">草稿箱</button>
          </div>
        </section>

        <!-- 隐藏面板(功能未完成):当前角色 -->
        <div id="identitySnapshot" hidden></div>
      </aside>

      <main class="main chat-workspace">
        <div id="globalBanner" class="global-banner" hidden></div>
        <section class="layout-grid detail-closed">
          <section class="stream chat-pane">
            <div class="section-head">
              <div class="stream-filter-inline" aria-label="频道筛选">
                <div id="quickFilters" class="quick-filters"></div>
              </div>
              <div class="stream-channel-tools">
                <label class="message-search" title="只搜索当前已选频道中的消息">
                  <span>搜索</span>
                  <input id="messageSearchInput" type="search" placeholder="当前频道" autocomplete="off" />
                </label>
                <span id="messageCount" class="message-count-pill">0 条</span>
                <details class="workspace-tools-shell" aria-label="账号、状态和工具">
                  <summary class="stream-tool-button workspace-tools-toggle">
                    <span>工具中心</span>
                    <small id="currentAccountLine">当前账号: 未登录</small>
                  </summary>
                  <div class="workspace-tools-panel">
                    <section class="panel identity-panel identity-drawer">
                      <div class="drawer-summary">
                        <span>身份</span>
                        <small>发送身份 / 登录</small>
                      </div>
                      <div class="identity-drawer-actions">
                        <button id="loginAccountButton" type="button">+ 登录账号</button>
                      </div>
                      <div id="identityList" class="identity-list sidebar-identity-list">
                        <p class="empty">还没有身份。先点上面「+ 登录账号」登一个 Telegram 账号,身份会自动建好。</p>
                      </div>
                      <div class="identity-panel-actions">
                        <button id="addIdentityButton" type="button" disabled title="先登录账号才能新增身份">+ 新增身份</button>
                        <button id="logoutAccountButton" type="button" disabled title="还没登录账号">登出账户</button>
                      </div>
                    </section>

                    <section class="panel session-drawer">
                      <div class="drawer-summary">
                        <span>角色状态</span>
                        <small>角色 / CD / 消息箱</small>
                      </div>
                      <div id="gameCockpit" class="game-cockpit sidebar-cockpit" aria-label="当前游戏会话">
                        <section class="cockpit-strip cockpit-player-strip" aria-label="当前身份">
                          <div id="cockpitIdentity" class="cockpit-identity-body"></div>
                        </section>

                        <section class="cockpit-strip cockpit-module-strip" aria-label="关键冷却">
                          <div class="cockpit-strip-head">
                            <span>关键冷却</span>
                          </div>
                          <div id="cockpitModules" class="cockpit-modules"></div>
                        </section>

                        <section class="cockpit-strip cockpit-inbox-strip" aria-label="消息箱健康">
                          <div id="cockpitInbox" class="cockpit-inbox"></div>
                        </section>
                      </div>
                      <details class="game-secondary-shell">
                        <summary>
                          <span>状态总览</span>
                          <small>态势 / 地图 / 任务 / 常用面板</small>
                        </summary>
                        <div class="game-secondary-panels">
                          <section id="gameHud" class="game-hud" aria-label="当前修仙状态">
                            <div id="hudIdentity" class="hud-panel hud-identity"></div>
                            <div class="hud-panel hud-modules-shell">
                              <div class="hud-panel-head">
                                <span>关键冷却</span>
                              </div>
                              <div id="hudModules" class="hud-modules"></div>
                            </div>
                            <div id="hudInbox" class="hud-panel hud-inbox"></div>
                          </section>
                          <section id="liveSituationBoard" class="live-situation-board" aria-label="当前态势"></section>
                          <section id="worldEventStrip" class="world-event-strip" aria-label="世界事件"></section>
                          <section id="gameSceneBoard" class="game-scene-board" aria-label="修仙地图"></section>
                          <section id="questTracker" class="quest-tracker" aria-label="任务追踪"></section>
                          <section id="gameActionDock" class="game-action-dock" aria-label="常用面板"></section>
                        </div>
                      </details>
                    </section>

                    <section class="panel tool-panel">
                      <div class="drawer-summary tool-panel-summary">
                        <span>工具</span>
                        <small>设置 / 通知 / Bot</small>
                      </div>
                      <div class="sidebar-toolbox">
                        <button id="refreshButton" type="button">刷新</button>
                        <button id="healthButton" type="button" title="查看监听、消息水位和断层审计">健康</button>
                        <button id="settingsButton" type="button">接入配置</button>
                        <button id="filterSettingsButton" type="button">过滤设置</button>
                        <button id="gameBotsButton" type="button">游戏 Bot</button>
                        <button id="notifySettingsButton" type="button" title="配置 Telegram / Bark / 钉钉 等通知通道">通知</button>
                      </div>
                    </section>
                  </div>
                </details>
              </div>
            </div>
            <section id="gamePrimaryStrip" class="game-primary-strip" aria-label="当前操作状态"></section>
            <div id="messageList" class="message-list"></div>
            <button id="jumpToLatest" class="jump-to-latest" type="button" hidden>↓ 回到最新</button>
          </section>

          <button id="detailBackdrop" class="detail-backdrop" type="button" aria-label="关闭消息详情" hidden></button>
          <aside class="detail">
            <div class="section-head detail-section-head">
              <div>
                <h3>消息详情</h3>
                <p>原文 / 回复 / 候选</p>
              </div>
              <div class="detail-head-actions">
                <span id="detailState">未选择</span>
                <button id="closeDetailButton" type="button" title="关闭消息详情">关闭</button>
              </div>
            </div>
            <div id="detailPanel" class="detail-panel">
              <p class="empty">选择一条消息。</p>
            </div>
          </aside>
        </section>

        <footer id="directSendComposer" class="direct-send-composer chat-composer" aria-label="发送栏">
          <div id="quickActionHotbar" class="quick-action-hotbar" aria-label="常用操作"></div>
          <div class="direct-send-head">
            <div class="direct-send-title">
              <strong>消息</strong>
              <span id="directSendIdentityLine">未选身份</span>
            </div>
            <div class="direct-send-actions">
              <button id="emojiPickerButton" type="button" class="composer-tool-button" aria-controls="directSendEmojiPalette" aria-expanded="false">表情</button>
              <button id="openCultivationButton" type="button" class="composer-tool-button">修炼状态</button>
            </div>
          </div>
          <div id="directSendReplyContext" class="direct-send-reply-context" hidden></div>
          <div id="directSendSelectionContext" class="direct-send-selection-context" hidden></div>
          <div id="directSendActionHints" class="direct-send-action-hints" hidden></div>
          <div class="direct-send-row">
            <label class="direct-send-identity">
              <span>发送身份</span>
              <select id="directSendIdentitySelect"></select>
            </label>
            <label class="direct-send-command">
              <span>发送内容</span>
              <textarea id="directSendInput" rows="2" placeholder="输入消息或命令。Enter 发送，Shift+Enter 换行"></textarea>
            </label>
            <button id="directSendSubmit" type="button">发送</button>
          </div>
          <div id="directSendEmojiPalette" class="emoji-palette direct-send-emoji-palette" hidden></div>
          <p id="directSendStatus" class="direct-send-status" hidden></p>
        </footer>
      </main>
    </div>

    <div id="skillToast" class="skill-toast" hidden></div>

    <div id="modalRoot" class="modal-backdrop" hidden></div>

    <script src="/static/state.js"></script>
    <script src="/static/constants.js"></script>
    <script src="/static/ui/format.js"></script>
    <script src="/static/api.js"></script>
    <script src="/static/ui/modal.js"></script>
    <script src="/static/ui/toast.js"></script>
    <script src="/static/views/logs.js"></script>
    <script src="/static/views/outbox.js"></script>
    <script src="/static/views/game_bots.js"></script>
    <script src="/static/views/game_scene.js"></script>
    <script src="/static/views/focus_archive.js"></script>
    <script src="/static/views/chat_stream.js"></script>
    <script src="/static/views/game_cockpit.js"></script>
    <script src="/static/views/leader_intel.js"></script>
    <script src="/static/views/xutian_guide.js"></script>
    <script src="/static/views/cangkun_guide.js"></script>
    <script src="/static/views/cultivation.js"></script>
    <script src="/static/views/dungeon_playbook.js"></script>
    <script src="/static/views/dungeon_status.js"></script>
    <script src="/static/views/filter_settings.js"></script>
    <script src="/static/views/health.js"></script>
    <script src="/static/views/identity_status.js"></script>
    <script src="/static/views/inventory.js"></script>
    <script src="/static/views/live_situation.js"></script>
    <script src="/static/views/notify.js"></script>
    <script src="/static/views/overview.js"></script>
    <script src="/static/views/quest_tracker.js"></script>
    <script src="/static/views/resource_stats.js"></script>
    <script src="/static/views/schedule.js"></script>
    <script src="/static/views/world_report.js"></script>
    <script src="/static/views/world_event.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
