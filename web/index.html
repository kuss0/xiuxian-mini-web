<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>修仙 Mini Web</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <section class="panel identity-panel">
          <div class="panel-head">
            <h2>身份列表</h2>
            <button id="loginAccountButton" type="button">+ 登录账号</button>
          </div>
          <p id="currentAccountLine" class="muted-line">当前账号: 未登录</p>
          <div id="identityList" class="identity-list sidebar-identity-list">
            <p class="empty">还没有身份。先点上面「+ 登录账号」登一个 Telegram 账号,身份会自动建好。</p>
          </div>
          <div class="identity-panel-actions">
            <button id="addIdentityButton" type="button" disabled title="先登录账号才能新增身份">+ 新增身份</button>
            <button id="logoutAccountButton" type="button" disabled title="还没登录账号">登出账户</button>
          </div>
        </section>

        <section class="panel channel-panel">
          <div class="panel-head">
            <h2>频道</h2>
            <button id="selectAllChannels" type="button">全选</button>
          </div>
          <p id="activeChannelText" class="muted-line">重点</p>
          <div id="channelFilters" class="channel-filters"></div>
        </section>

        <!-- 隐藏面板(功能未完成):当前角色 -->
        <div id="identitySnapshot" hidden></div>
      </aside>

      <main class="main">
        <div id="globalBanner" class="global-banner" hidden></div>
        <header class="topbar">
          <div class="topbar-actions">
            <button id="refreshButton" type="button">刷新</button>
            <button id="logsButton" type="button" title="按日期 / 类型筛选浏览全部采集到的消息">日志</button>
            <button id="dungeonStatusButton" type="button" title="按副本 ID 汇总最近开房、加入、失败、解散和推进消息">副本状态</button>
            <button id="resourceStatsButton" type="button" title="野外历练和非血色副本的全服收益统计">资源统计</button>
            <button id="inventoryButton" type="button" title="查看最近储物袋快照并生成批量转移命令">库存/转移</button>
            <button id="outboxButton" type="button">草稿箱</button>
            <button id="filterSettingsButton" type="button">过滤设置</button>
            <button id="gameBotsButton" type="button">游戏 Bot</button>
            <button id="notifySettingsButton" type="button" title="配置 Telegram / Bark / 钉钉 等通知通道">🔔 通知</button>
          </div>
        </header>

        <section class="layout-grid">
          <section class="stream">
            <div class="section-head">
              <div id="quickFilters" class="quick-filters"></div>
              <span id="messageCount" class="message-count-pill">0 条</span>
            </div>
            <div id="characterHud" class="character-hud" hidden></div>
            <div id="messageList" class="message-list"></div>
            <button id="jumpToLatest" class="jump-to-latest" type="button" hidden>↑ 回到最新</button>
          </section>

          <aside class="detail">
            <div class="section-head">
              <div>
                <h3>消息详情</h3>
                <p>原文、增强信息和操作草稿</p>
              </div>
              <span id="detailState">未选择</span>
            </div>
            <div id="detailPanel" class="detail-panel">
              <p class="empty">选择一条消息查看原文与可用操作。</p>
            </div>
          </aside>
        </section>

        <footer id="directSendComposer" class="direct-send-composer">
          <div class="direct-send-head">
            <div class="direct-send-title">
              <strong>直接发送</strong>
              <span id="directSendIdentityLine">未选身份</span>
            </div>
            <div class="direct-send-tools">
              <button id="emojiPickerButton" type="button" aria-controls="directSendEmojiPalette" aria-expanded="false">表情</button>
              <button id="openSkillMenuButton" type="button" aria-controls="directSendSkillPanel" aria-expanded="false">快捷指令</button>
              <button id="openCultivationButton" type="button">修炼状态</button>
              <button id="scheduleButton" type="button">官方定时</button>
            </div>
          </div>
          <div class="direct-send-row">
            <label class="direct-send-identity">
              <span>发送身份</span>
              <select id="directSendIdentitySelect"></select>
            </label>
            <label class="direct-send-command">
              <span>发送内容</span>
              <textarea id="directSendInput" rows="2" placeholder="输入要发到 Telegram 的文本，例如 .查看闭关。Enter 发送，Shift+Enter 换行"></textarea>
            </label>
            <button id="directSendSubmit" type="button">发送</button>
          </div>
          <div id="directSendEmojiPalette" class="emoji-palette direct-send-emoji-palette" hidden></div>
          <div id="directSendSkillPanel" class="direct-send-skill-panel" hidden>
            <div class="skill-bar-head">
              <div class="skill-bar-tabs" id="skillBarTabs"></div>
              <div class="skill-bar-meta">
                <span id="skillBarIdentity" class="skill-bar-identity">未选身份</span>
              </div>
            </div>
            <div id="skillBarChips" class="skill-bar-chips"></div>
          </div>
          <p id="directSendStatus" class="direct-send-status" hidden></p>
        </footer>
      </main>
    </div>

    <div id="skillToast" class="skill-toast" hidden></div>

    <div id="modalRoot" class="modal-backdrop" hidden></div>

    <script src="/static/app.js"></script>
  </body>
</html>
