# Docker Compose for Production
version: '3.8'

services:
  web:
    image: xiuxian-mini-web:latest
    container_name: xiuxian-web-prod
    restart: always
    ports:
      - "8787:8787"
    volumes:
      - data:/app/data
      - logs:/app/logs
    environment:
      - MINIWEB_ACCESS_TOKEN=${MINIWEB_ACCESS_TOKEN}
      - MINIWEB_HOST=0.0.0.0
      - MINIWEB_PORT=8787
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_MAX_REQUESTS=100
      - RATE_LIMIT_WINDOW_SEC=60
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H \"X-Miniweb-Token: $$MINIWEB_ACCESS_TOKEN\" http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - xiuxian-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  xiuxian-network:
    driver: bridge

volumes:
  data:
    driver: local
  logs:
    driver: local
